services:
  product_db:
    container_name : product_db
    image: postgres:15
    environment:
      POSTGRES_DB: dummyjson_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: product_db

  redis:
    container_name : redis
    image: redis:7-alpine
    ports:
      - "6379:6379"

  django:
    container_name : django
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - product_db
      - redis

volumes:
  postgres_data: